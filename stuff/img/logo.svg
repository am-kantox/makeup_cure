<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    
    <linearGradient id="highlight-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5c2e7"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="500" rx="100" fill="url(#bg-grad)"/>

  <rect x="80" y="80" width="340" height="260" rx="15" fill="#181825" stroke="#313244" stroke-width="4"/>
  
  <circle cx="110" cy="110" r="6" fill="#f38ba8"/>
  <circle cx="135" cy="110" r="6" fill="#f9e2af"/>
  <circle cx="160" cy="110" r="6" fill="#a6e3a1"/>

  <rect x="110" y="150" width="140" height="14" rx="7" fill="#45475a"/>
  
  <rect x="110" y="195" width="80" height="14" rx="7" fill="#89b4fa"/> 
  <rect x="200" y="195" width="130" height="14" rx="7" fill="url(#highlight-grad)" filter="url(#glow)"/> 
  
  <rect x="110" y="240" width="220" height="14" rx="7" fill="#45475a"/>
  <rect x="110" y="285" width="100" height="14" rx="7" fill="#45475a"/>

  <g transform="translate(330, 180)" fill="#f5c2e7" filter="url(#glow)">
    <path d="M15,0 C15,10 25,15 35,15 C25,15 15,20 15,30 C15,20 5,15 -5,15 C5,15 15,10 15,0 Z" />
    <path d="M45,-20 C45,-14 51,-11 57,-11 C51,-11 45,-8 45,-2 C45,-8 39,-11 33,-11 C39,-11 45,-14 45,-20 Z" />
  </g>

  <text x="250" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol'" font-size="46" font-weight="800" fill="#cba6f7" text-anchor="middle" letter-spacing="1">
    makeup_cure
  </text>
</svg>
